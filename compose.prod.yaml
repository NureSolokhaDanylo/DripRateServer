services:
  api:
    image: driprate-api:latest
    restart: always
    build:
      context: .
      dockerfile: Api/Dockerfile
      args:
        - configuration=Release
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION_STRING}
      - Jwt__Key=${Jwt_Key}
      - BlobStorage__ConnectionString=${BlobStorage__ConnectionString}
      - BlobStorage__ContainerName=${BlobStorage__ContainerName}
      - BlobStorage__DefaultAvatarUrl=${BlobStorage__DefaultAvatarUrl}
      - FEED__ADFREQUENCY=${FEED_ADFREQUENCY}
      - FEED__VIEWCOOLDOWNHOURS=${FEED_VIEWCOOLDOWNHOURS}
